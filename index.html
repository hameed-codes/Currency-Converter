<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="d-flex align-items-center justify-content-center fw-semibold">

    <div class="container p-3 d-flex flex-column justify-content-center align-items-center rounded-4" id="converter">
        <h1 class="fs-1 fw-bolder mb-4">Currency Converter</h1>

        <div class="container d-flex justify-content-center align-items-center" id="flagsAndCodes">
            <!--From Div-->
            <div class="container d-flex justify-content-center align-items-center flex-column p-2" id="from-div">
                <img class="w-100 rounded-3 mb-3" src="https://flagcdn.com/w320/us.png" alt="">
                <select class="form-select" aria-label="Default select example" name="from-select">
                </select>
            </div>

            <!--Exchange Btn Div-->
            <div class="d-flex flex-column align-items-center justify-content-center">
                <button class="btn btn-warning w-100" name="swap-sides"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>

            <!--To Div-->
            <div class="container d-flex justify-content-center align-items-center flex-column p-2" id="to-div">
                <img  class="w-100 rounded-3 mb-3" src="https://flagcdn.com/w320/pk.png" alt="">
                <select class="form-select" aria-label="Default select example" name="to-select">
                </select>
            </div>
        </div>

        <!--exchange rate bar-->
        <p class="rounded-4 bg-dark text-light py-2 px-3 text-center my-3" id="exchange-rate">Loading...</p>

        <!--Input figure-->
        <div class="input-group flex-nowrap mb-4 px-3">
            <input type="number" class="form-control fs-5 fw-semibold" name="from-input" placeholder="0.0" aria-label="input-field" aria-describedby="addon-wrapping">
        </div>

        <!--Result Figure-->
        <div class="input-group flex-nowrap px-3">
            <input type="number" class="form-control fs-3 fw-semibold" placeholder="0.0" aria-label="output-field" name="result-input" aria-describedby="addon-wrapping" disabled>
        </div>

        <!--Convert Btn-->
        <button class="btn btn-warning fw-semibold mt-2" name="calculate">Exchange</button>
    </div>


    <script src="./src/codes.js"></script>
    <script src="./src/script.js"></script>
</body>

</html>
