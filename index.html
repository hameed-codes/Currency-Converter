<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="container p-3 d-flex flex-column justify-content-center align-items-center" id="converter">
        <h1>Currency Converter</h1>
        <div class="container d-flex justify-content-center align-items-center" id="">
            <!--From Div-->
            <div class="container d-flex justify-content-center align-items-center flex-column" id="from-div">
                <img src="https://flagcdn.com/w320/pk.png" alt="" width="110px">
                <select class="form-select" aria-label="Default select example">
                    <option selected>Open this select menu</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>

            <!--Exchange Btn Div-->
            <div class=" flex-column">
                <button class="btn btn-primary" id="exchnage-div"><i class="fa-solid fa-arrows-rotate"></i></button>
            </div>

            <!--To Div-->
            <div class="container d-flex justify-content-center align-items-center flex-column" id="to-div">
                <img src="https://flagcdn.com/w320/pk.png" alt="" width="110px">
                <select class="form-select" aria-label="Default select example">
                    <option selected>Open this select menu</option>
                    <option value="1">One</option>
                    <option value="2">Two</option>
                    <option value="3">Three</option>
                </select>
            </div>
        </div>

        <p id="exchange-rate">Exchange Rate</p>

        <!--Input figure-->
        <div class="input-group flex-nowrap">
            <span class="input-group-text" id="addon-wrapping">@</span>
            <input type="text" class="form-control" placeholder="Username" aria-label="Username"
                aria-describedby="addon-wrapping">
        </div>

        <!--Result Figure-->
        <div class="input-group flex-nowrap">
            <span class="input-group-text" id="addon-wrapping">@</span>
            <input type="text" class="form-control" placeholder="Username" aria-label="Username"
                aria-describedby="addon-wrapping">
        </div>
    </div>

</body>

</html>
